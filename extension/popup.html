<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
  <title>Fantastic Food</title>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="https://www.fantasticfood.in/logo.png" style="width: 32px; height: 32px; border-radius: 6px; object-fit: contain; background: #0F2419; padding: 2px;" alt="Logo" />
      <h2>Fantastic Food</h2>
    </div>
    
    <p class="subtitle">Reading a great recipe?<br>Let's find the cheapest ingredients.</p>
    
    <button id="scan-btn" class="primary-btn">
      <span class="btn-text">⚡ Scan Recipe</span>
      <div class="loader hidden"></div>
    </button>
    
    <div id="status" class="status-msg hidden">Scanning ingredients...</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
