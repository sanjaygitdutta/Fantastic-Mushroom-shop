name: 🍄 Daily AI Recipe Generator

on:
  # Runs every day at 3:00 AM IST (21:30 UTC)
  schedule:
    - cron: '30 21 * * *'

  # Also allows manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  generate-recipe:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write   # Needed to commit back to the repo

    steps:
      - name: ⏳ Inject Random Temporal Delay (5m to 5h)
        run: |
          DELAY=$(( ( RANDOM % 17700 ) + 300 ))
          echo "Sleeping for $DELAY seconds to humanize scheduling footprint..."
          sleep $DELAY

      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🔑 Check API key is set
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "❌ ERROR: GEMINI_API_KEY secret is not set!"
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "✅ API key is set (length: ${#GEMINI_API_KEY} chars)"

      - name: 🔍 List valid Gemini models
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          curl -s "https://generativelanguage.googleapis.com/v1beta/models?key=$GEMINI_API_KEY" | grep '"name"'

      - name: 📦 Install dependencies
        run: npm ci || npm install

      - name: 🤖 Generate new AI recipe
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node --experimental-vm-modules scripts/generate-recipe.mjs

      - name: 📝 Stealth Git Commit and Push
        run: |
          git config --local user.email "sanjay.dutta@fantasticfood.in"
          git config --local user.name "Sanjay Dutta"
          git add src/data/recipes.ts
          # Also stage any newly generated AI recipe images
          git add public/recipe-images/ 2>/dev/null || true
          
          # Select a random humanized commit message
          MESSAGES=(
            "feat: update seasonal recipe catalog"
            "refactor: optimize dynamic recipe entries"
            "docs: update translation schema for world recipes"
            "chore: update database records"
            "fix: clean up recipe data entries"
          )
          RANDOM_MSG=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}
          
          git diff --staged --quiet || git commit -m "$RANDOM_MSG"
          git push

      - name: 🐦 Publish to Twitter/X
        continue-on-error: true
        env:
          TWITTER_APP_KEY: ${{ secrets.TWITTER_APP_KEY }}
          TWITTER_APP_SECRET: ${{ secrets.TWITTER_APP_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: node scripts/post-to-twitter.mjs
