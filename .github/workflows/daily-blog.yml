name: 📰 Daily AI SEO Blog Generator

on:
  # Runs every day at 03:30 AM IST (22:00 UTC)
  schedule:
    - cron: '00 22 * * *'

  # Also allows manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write   # Needed to commit back to the repo

    steps:
      - name: ⏳ Inject Random Temporal Delay (5m to 30m)
        run: |
          DELAY=$(( ( RANDOM % 1500 ) + 300 ))
          echo "Sleeping for $DELAY seconds to humanize scheduling footprint..."
          sleep $DELAY


      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🔑 Check API key is set
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "❌ ERROR: GEMINI_API_KEY secret is not set!"
            exit 1
          fi

      - name: 📦 Install dependencies
        run: npm ci || npm install

      - name: 🤖 Generate new AI SEO Blog
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node --experimental-vm-modules scripts/generate-blog.mjs

      - name: 📝 Stealth Git Commit and Push
        run: |
          git config --local user.email "sanjay.dutta@fantasticfood.in"
          git config --local user.name "Sanjay Dutta"
          git add src/data/blogPosts.ts
          
          # Select a random humanized commit message
          MESSAGES=(
            "feat: update seasonal recipe catalog"
            "refactor: optimize dynamic recipe entries"
            "docs: update translation schema for world recipes"
            "chore: update database records"
            "fix: clean up recipe data entries"
          )
          RANDOM_MSG=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}
          
          git diff --staged --quiet || git commit -m "$RANDOM_MSG"
          git push
