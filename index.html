<body>
  <div id="root">
    <!-- Initial Pre-render Loader to fix LCP (Largest Contentful Paint) -->
    <!-- This renders instantly in < 50ms and is automatically removed when React boots -->
    <style>
      body { margin: 0; }
      .app-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #fdfbf7; /* bg-cream-50 */
        font-family: system-ui, -apple-system, sans-serif;
      }
      .app-loader-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #d1fae5; /* green-100 */
        border-top: 4px solid #10b981; /* green-500 */
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      .app-loader h2 {
        color: #064e3b; /* forest-900 */
        font-size: 1.5rem;
        font-weight: 800;
        margin: 0 0 8px;
      }
      .app-loader p {
        color: #047857; /* forest-700 */
        font-size: 0.9rem;
        margin: 0;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
    <div class="app-loader">
      <div class="app-loader-spinner"></div>
      <h2>Fantastic Food</h2>
      <p>Fetching live prices...</p>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
