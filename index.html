<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Google Search Console verification -->
  <meta name="google-site-verification" content="yCwjAf_s2oqIMDIzlBtIPj671YFoitNF01dM-zP-Zv0" />
  
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Fantastic Food",
    "url": "https://fantasticfood.in",
    "description": "India's smartest food price comparator. Compare grocery and food prices across Blinkit, BigBasket, Zepto, Swiggy Instamart, Amazon Fresh, and JioMart in real-time.",
    "publisher": {
      "@type": "Organization",
      "name": "Fantastic Food",
      "url": "https://fantasticfood.in",
      "logo": { "@type": "ImageObject", "url": "https://fantasticfood.in/logo.png" }
    },
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://fantasticfood.in/compare?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
  
  <title>Fantastic Food | India's Smartest Food Price Comparator</title>
  <meta name="description"
    content="Compare prices across Blinkit, BigBasket, Zepto, Swiggy, Amazon Fresh, and JioMart instantly. Find the best deals on groceries and order fresh mushrooms directly from our farm." />
  <meta name="keywords"
    content="food price comparison, grocery prices india, compare blinkit zepto swiggy, fresh organic mushrooms, fantastic food" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://fantasticfood.in/" />
  <meta property="og:title" content="Fantastic Food | India's Smartest Food Price Comparator" />
  <meta property="og:description"
    content="Compare real-time grocery prices across 6 major quick-commerce platforms and save money on your daily needs." />
  <meta property="og:image" content="https://fantasticfood.in/og-image.jpg" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://fantasticfood.in/" />
  <meta property="twitter:title" content="Fantastic Food | India's Smartest Food Price Comparator" />
  <meta property="twitter:description"
    content="Compare real-time grocery prices across 6 major quick-commerce platforms and save money on your daily needs." />
  <meta property="twitter:image" content="https://fantasticfood.in/og-image.jpg" />

  <meta name="theme-color" content="#2d6a4f" />
  <link rel="canonical" href="https://fantasticfood.in/" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
